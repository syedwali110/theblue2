<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Shops & Stores — The Blue Karachi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cinzel+Decorative:wght@400;700&family=Raleway:ital,wght@0,200;0,300;0,400;0,500;0,600;1,300&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
.sec{padding:7rem 0;position:relative}
.sec.dark{background:linear-gradient(180deg,#071018,#081520,#071018)}
.sec.ptn{background:#071018}
.sec.ptn::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle at 2px 2px,rgba(201,146,26,.06) 1px,transparent 0);background-size:38px 38px;pointer-events:none}
/* FILTER BAR */
.filter-bar{display:flex;gap:.6rem;flex-wrap:wrap;margin-bottom:2.5rem;padding:.6rem 0;border-bottom:1px solid rgba(201,146,26,.15)}
.fb-btn{font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.22em;text-transform:uppercase;padding:.45rem 1.1rem;background:transparent;border:1px solid rgba(201,146,26,.22);color:#7a7a7a;cursor:pointer;transition:all .25s}
.fb-btn:hover,.fb-btn.active{background:rgba(201,146,26,.1);border-color:#c9921a;color:#c9921a}
/* FLOOR TABS */
.floor-tabs{display:flex;gap:0;flex-wrap:wrap;background:rgba(201,146,26,.12);margin-bottom:2rem;border:1px solid rgba(201,146,26,.2)}
.ft{font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.22em;text-transform:uppercase;padding:.7rem 1.4rem;background:transparent;border:none;color:#7a7a7a;cursor:pointer;transition:all .25s}
.ft:hover,.ft.active{background:rgba(201,146,26,.15);color:#c9921a}
/* BRANDS GRID */
.brands-full{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:rgba(201,146,26,.18)}
.brand-card{background:#071018;padding:1.8rem 1.4rem;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.7rem;text-align:center;cursor:pointer;transition:all .35s;min-height:120px;position:relative;overflow:hidden}
.brand-card::before{content:'';position:absolute;inset:0;background:radial-gradient(circle,rgba(26,58,92,.5),transparent);opacity:0;transition:opacity .3s}
.brand-card:hover{background:#0d2137;border-color:rgba(201,146,26,.5);transform:scale(1.02);z-index:2}
.brand-card:hover::before{opacity:1}
.bc-name{font-family:'Glory',sans-serif;font-weight:800;font-size:.95rem;color:var(--white);letter-spacing:.05em}
.bc-cat{font-family:'Glory',sans-serif;font-weight:800;font-size:.65rem;letter-spacing:.2em;color:var(--gold-dim);text-transform:uppercase}
.bc-floor{font-family:'Glory',sans-serif;font-weight:800;font-size:.55rem;letter-spacing:.15em;color:rgba(201,146,26,.6);text-transform:uppercase;margin-top:.2rem}
/* FLOOR MAP */
.floor-map{border:1px solid rgba(201,146,26,.2);background:linear-gradient(135deg,#071018,#0d2137);padding:2.5rem;position:relative;overflow:hidden}
.floor-map-bg{position:absolute;inset:0;background-size:cover;background-position:center;opacity:0.1;transition:opacity .5s}
.fm-title{position:relative;z-index:1;font-family:'Glory',sans-serif;font-weight:800;font-size:.8rem;letter-spacing:.3em;color:#c9921a;text-transform:uppercase;margin-bottom:1.5rem;text-align:center}
.fm-grid{position:relative;z-index:1;display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:rgba(201,146,26,.15)}
.fm-floor{background:#071018;padding:1.2rem 1rem;text-align:center;cursor:pointer;transition:background .3s}
.fm-floor:hover,.fm-floor.active{background:rgba(26,58,92,.5)}
.fm-fl-num{font-family:'Glory',sans-serif;font-weight:800;font-size:1.1rem;color:#c9921a;line-height:1;margin-bottom:.4rem}
.fm-fl-name{font-size:.65rem;color:#7a7a7a}
@media(max-width:1024px){.brands-full{grid-template-columns:repeat(3,1fr)}}
@media(max-width:600px){.brands-full{grid-template-columns:repeat(2,1fr)}.fm-grid{grid-template-columns:repeat(4,1fr)}}
</style>
</head>
<body>
<div id="cur-dot"></div><div id="cur-ring"></div>
<div id="loader"></div>
<nav id="nav"></nav>

<div class="page-hero">
  <div class="page-hero-badge">Store Directory</div>
  <h1 class="page-hero-title">Shops & Brands</h1>
  <p class="page-hero-sub">Over 200 premium stores across 7 floors — every brand, every style</p>
</div>
<div id="ticker"></div>

<!-- CATEGORIES -->
<section class="sec ptn">
  <div class="container">
    <div style="display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:1rem;margin-bottom:2.5rem" data-r>
      <div><div class="section-lbl">Browse By Category</div><h2 class="section-h">Shop <em>Categories</em></h2></div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:rgba(201,146,26,.18)" id="catsGrid"></div>
  </div>
</section>

<!-- BRAND DIRECTORY -->
<section class="sec dark">
  <div class="container">
    <div data-r style="margin-bottom:2rem"><div class="section-lbl">All Stores</div><h2 class="section-h">Brand <em>Directory</em></h2></div>
    <div class="filter-bar" id="filterBar">
      <button class="fb-btn active" data-cat="all">All Stores</button>
      <button class="fb-btn" data-cat="Fashion">Fashion</button>
      <button class="fb-btn" data-cat="Luxury">Luxury</button>
      <button class="fb-btn" data-cat="Beauty">Beauty</button>
      <button class="fb-btn" data-cat="Electronics">Electronics</button>
      <button class="fb-btn" data-cat="Sports">Sports</button>
      <button class="fb-btn" data-cat="Kids">Kids</button>
      <button class="fb-btn" data-cat="Home">Home & Living</button>
    </div>
    <div class="brands-full" id="brandsGrid"></div>
  </div>
</section>

<!-- FLOOR MAP -->
<section class="sec ptn">
  <div class="container">
    <div data-r style="margin-bottom:2.5rem;text-align:center"><div class="section-lbl" style="justify-content:center;margin-bottom:.8rem"><span></span>Floor Guide</div><h2 class="section-h" style="text-align:center">Mall <em>Floor Directory</em></h2></div>
    <div class="floor-map">
      <div class="floor-map-bg" id="floorMapBg"></div>
      <div class="fm-title">Click Any Floor to See What's There</div>
      <div class="fm-grid" id="floorGrid"></div>
      <div id="floorDetail" style="position:relative;z-index:1;margin-top:1.5rem;padding:1.5rem;border:1px solid rgba(201,146,26,.2);background:rgba(7,16,24,0.85);backdrop-filter:blur(10px);display:none">
        <div id="floorDetailContent"></div>
      </div>
    </div>
  </div>
</section>

<footer id="footer"></footer>
<script src="shared.js"></script>
<script>
initAll('shops.html');

const allBrands = [
  {name:'Khaadi',cat:'Fashion',floor:'Level 2'},{name:'Sapphire',cat:'Fashion',floor:'Level 2'},{name:'Outfitters',cat:'Fashion',floor:'Level 3'},
  {name:'J.',cat:'Fashion',floor:'Level 2'},{name:'Zara',cat:'Fashion',floor:'Level 3'},{name:"Levi's",cat:'Fashion',floor:'Level 3'},
  {name:'Mango',cat:'Fashion',floor:'Level 3'},{name:'Bonanza Satrangi',cat:'Fashion',floor:'Level 2'},{name:'Gul Ahmed',cat:'Fashion',floor:'Level 2'},
  {name:'Swarovski',cat:'Luxury',floor:'Level 1'},{name:'Omega',cat:'Luxury',floor:'Level 1'},{name:'Tag Heuer',cat:'Luxury',floor:'Level 1'},
  {name:'MAC',cat:'Beauty',floor:'Level 1'},{name:'L\'Oréal',cat:'Beauty',floor:'Level 3'},{name:'Bath & Body',cat:'Beauty',floor:'Level 3'},
  {name:'Samsung',cat:'Electronics',floor:'Level 4'},{name:'Apple Premium',cat:'Electronics',floor:'Level 4'},{name:'Haier',cat:'Electronics',floor:'Level 4'},
  {name:'Nike',cat:'Sports',floor:'Level 3'},{name:'Adidas',cat:'Sports',floor:'Level 3'},{name:'Puma',cat:'Sports',floor:'Level 4'},
  {name:'Mothercare',cat:'Kids',floor:'Level 4'},{name:'Hamleys',cat:'Kids',floor:'Level 4'},{name:'H&M Kids',cat:'Kids',floor:'Level 4'},
  {name:'Home Centre',cat:'Home',floor:'Level 4'},{name:'Pottery Barn',cat:'Home',floor:'Level 4'},{name:'IKEA Partner',cat:'Home',floor:'Level 4'},
];
const floors = [
  {num:'B1',name:'Parking & Services',stores:'Parking, Storage, Technical Services'},
  {num:'G',name:'Ground Floor',stores:'Jewellery, Luxury Brands, Bank, ATMs, Concierge'},
  {num:'L1',name:'Level 1',stores:'Fashion Entry, Department Store, Accessories'},
  {num:'L2',name:'Level 2',stores:'Fashion (Pakistani), Books, Cafés, Services'},
  {num:'L3',name:'Level 3',stores:'International Fashion, Beauty, Sports, Kids'},
  {num:'L4',name:'Level 4',stores:'Electronics, Home Living, Entertainment, Game Zone'},
  {num:'L5',name:'Level 5',stores:'Cineplex Premium (Screens 1–3), Dining'},
  {num:'L6',name:'Level 6',stores:'Cineplex Premium (Screens 4–6), Fine Dining, Spa'},
  {num:'L7',name:'Level 7',stores:'Rooftop Dining, The Perch Restaurant, Events'},
];

// Render cats
const cats = CMS.get('categories');
document.getElementById('catsGrid').innerHTML = cats.map((c,i)=>`
  <div class="item-card" data-r style="transition-delay:${i*.07}s">
    ${c.image ? `<div style="position:absolute;inset:0;background:url('${c.image}') center/cover;opacity:0.2;z-index:0"></div>` : ''}
    <div class="item-card-icon" style="position:relative;z-index:1">${c.icon}</div>
    <div class="item-card-name" style="position:relative;z-index:1">${c.name}</div>
    <div class="item-card-desc" style="position:relative;z-index:1">${c.desc}</div>
    <div class="item-card-floor" style="position:relative;z-index:1">${c.floor}</div>
  </div>`).join('');

// Render brands
function renderBrands(cat='all'){
  const filtered = cat==='all' ? allBrands : allBrands.filter(b=>b.cat===cat);
  document.getElementById('brandsGrid').innerHTML = filtered.map(b=>`
    <div class="brand-card">
      <div class="bc-name">${b.name}</div>
      <div class="bc-cat">${b.cat}</div>
      <div class="bc-floor">${b.floor}</div>
    </div>`).join('');
}

// Initial filtering based on URL parameters
const urlParams = new URLSearchParams(window.location.search);
const floorParam = urlParams.get('floor');
if (floorParam) {
  // Pre-filter by floor by modifying the internal render logic temporarily
  const filteredByFloor = allBrands.filter(b => b.floor.toLowerCase().includes(floorParam.toLowerCase()));
  document.getElementById('brandsGrid').innerHTML = filteredByFloor.map(b=>`
    <div class="brand-card">
      <div class="bc-name">${b.name}</div>
      <div class="bc-cat">${b.cat}</div>
      <div class="bc-floor">${b.floor}</div>
    </div>`).join('');
    
  // Highlight the correct filter button if applicable, otherwise reset them all to inactive
  document.querySelectorAll('.fb-btn').forEach(b=>b.classList.remove('active'));
} else {
  renderBrands();
}

document.getElementById('filterBar').addEventListener('click', e=>{
  if(!e.target.classList.contains('fb-btn')) return;
  document.querySelectorAll('.fb-btn').forEach(b=>b.classList.remove('active'));
  e.target.classList.add('active');
  renderBrands(e.target.dataset.cat);
});

// Floor map
const cmsLevels = CMS.get('levels') || [];
// Fallback if no CMS levels exist yet
const renderFloors = cmsLevels.length ? cmsLevels.map((l,i) => ({...l, num: `L${i+1}`})) : floors;

document.getElementById('floorGrid').innerHTML = renderFloors.map((f,i)=>`
  <div class="fm-floor" data-i="${i}">
    <div class="fm-fl-num">${f.num || ''}</div>
    <div class="fm-fl-name">${f.name}</div>
  </div>`).join('');

document.getElementById('floorGrid').addEventListener('click', e=>{
  const fl = e.target.closest('.fm-floor'); if(!fl) return;
  document.querySelectorAll('.fm-floor').forEach(f=>f.classList.remove('active'));
  fl.classList.add('active');
  const f = renderFloors[fl.dataset.i];
  const d = document.getElementById('floorDetail');
  
  // Set background image
  const bg = document.getElementById('floorMapBg');
  if(f.image) {
    bg.style.backgroundImage = `url('${f.image}')`;
    bg.style.opacity = '0.35';
  } else {
    bg.style.backgroundImage = 'none';
  }

  document.getElementById('floorDetailContent').innerHTML = `
    <div style="font-family:'Glory',sans-serif;font-weight:800;font-size:.75rem;letter-spacing:.3em;color:#c9921a;text-transform:uppercase;margin-bottom:.6rem">${f.num || ''} — ${f.name}</div>
    <div style="font-size:.9rem;color:#d4cfc3;line-height:1.6">${f.stores || f.desc || ''}</div>`;
  d.style.display='block';
});

setTimeout(()=>{ document.querySelectorAll('[data-r]').forEach(el=>{ new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting)e.target.classList.add('vis')}),{threshold:.1}).observe(el); }); },100);
</script>
</body>
</html>
